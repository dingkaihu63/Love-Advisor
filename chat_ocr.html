<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天截图 → 文字提取</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; padding: 20px;
        }
        .card {
            max-width: 700px; width: 100%; background: white; border-radius: 20px;
            padding: 36px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-top: 20px; margin-bottom: 20px;
        }
        h2 { font-size: 22px; margin-bottom: 4px; color: #1d1d1f; }
        .sub { color: #86868b; font-size: 13px; margin-bottom: 24px; }

        .drop-zone {
            border: 2px dashed #d2d2d7; border-radius: 16px; padding: 48px 24px;
            text-align: center; cursor: pointer; transition: all 0.2s;
            background: #fafafa; margin-bottom: 20px;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #667eea; background: #f5f3ff;
        }
        .drop-zone .icon { font-size: 40px; margin-bottom: 12px; }
        .drop-zone .hint { font-size: 15px; color: #1d1d1f; font-weight: 500; margin-bottom: 4px; }
        .drop-zone .hint-sub { font-size: 12px; color: #86868b; }
        .drop-zone input { display: none; }

        .preview-row { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
        .preview-row img {
            max-height: 120px; border-radius: 10px; border: 1px solid #e8e8ed;
        }
        .preview-row .info { font-size: 13px; color: #6e6e73; }
        .preview-row .info strong { color: #1d1d1f; }

        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn {
            padding: 12px 24px; border-radius: 10px; border: none; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white; flex: 1;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-reset { background: #f5f5f7; color: #6e6e73; }
        .btn-reset:hover { background: #e8e8ed; }

        .progress-wrap { margin-bottom: 20px; display: none; }
        .progress-wrap.show { display: block; }
        .progress-bar-wrap { width: 100%; height: 6px; background: #e8e8ed; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; border-radius: 3px; }
        .progress-text { font-size: 12px; color: #86868b; text-align: center; }

        .result-wrap { display: none; }
        .result-wrap.show { display: block; }
        .result-label { font-size: 13px; color: #86868b; margin-bottom: 8px; font-weight: 500; }
        textarea.result {
            width: 100%; height: 300px; font-family: 'SF Mono', Consolas, monospace;
            font-size: 13px; background: #1d1d1f; color: #00ff41; padding: 16px;
            border-radius: 12px; border: none; resize: vertical; line-height: 1.6;
        }
        .result-meta { font-size: 12px; color: #86868b; margin-top: 8px; text-align: right; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1d1d1f; color: white; padding: 12px 28px; border-radius: 12px;
            font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; z-index: 100;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="card">
    <h2>💬 聊天截图 → 文字</h2>
    <div class="sub">拖拽微信/QQ截图到这里，自动识别中文并保存为 txt<br>所有处理都在本地浏览器完成，不会上传任何数据</div>

    <div class="drop-zone" id="dropZone">
        <div class="icon">📸</div>
        <div class="hint">拖拽截图到这里，或点击选择</div>
        <div class="hint-sub">支持 PNG / JPG / WEBP，建议截图清晰</div>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg,image/webp,image/bmp">
    </div>

    <div class="preview-row" id="previewRow" style="display:none">
        <img id="previewImg" src="" alt="预览">
        <div class="info">
            <strong id="previewName"></strong><br>
            <span id="previewSize"></span>
        </div>
    </div>

    <div class="btn-row" id="btnRow" style="display:none">
        <button class="btn btn-primary" id="btnStart" onclick="startOCR()">🔍 开始识别</button>
        <button class="btn btn-reset" onclick="resetAll()">重新选择</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
        <div class="progress-text" id="progressText">正在下载中文语言包...</div>
    </div>

    <div class="result-wrap" id="resultWrap">
        <div class="result-label">📋 识别结果（已自动保存到下载文件夹）</div>
        <textarea class="result" id="resultText" readonly></textarea>
        <div class="result-meta" id="resultMeta"></div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const previewRow = document.getElementById('previewRow');
const previewImg = document.getElementById('previewImg');
const previewName = document.getElementById('previewName');
const previewSize = document.getElementById('previewSize');
const btnRow = document.getElementById('btnRow');
const btnStart = document.getElementById('btnStart');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const resultWrap = document.getElementById('resultWrap');
const resultText = document.getElementById('resultText');
const resultMeta = document.getElementById('resultMeta');
const toast = document.getElementById('toast');

let selectedFile = null;

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const files = e.dataTransfer.files;
    if (files.length > 0) handleFile(files[0]);
});
fileInput.addEventListener('change', e => {
    if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

function handleFile(file) {
    if (!file.type.match(/^image\//)) {
        showToast('请选择图片文件');
        return;
    }
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
        previewImg.src = e.target.result;
        previewName.textContent = file.name;
        previewSize.textContent = (file.size / 1024).toFixed(1) + ' KB';
        previewRow.style.display = 'flex';
        btnRow.style.display = 'flex';
        resultWrap.classList.remove('show');
        progressWrap.classList.remove('show');
        dropZone.style.display = 'none';
    };
    reader.readAsDataURL(file);
}

function resetAll() {
    selectedFile = null;
    fileInput.value = '';
    previewRow.style.display = 'none';
    btnRow.style.display = 'none';
    resultWrap.classList.remove('show');
    progressWrap.classList.remove('show');
    dropZone.style.display = 'block';
}

function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

async function startOCR() {
    if (!selectedFile) return;

    btnStart.disabled = true;
    progressWrap.classList.add('show');
    progressBar.style.width = '0%';
    progressText.textContent = '正在加载中文识别引擎...';

    try {
        const worker = await Tesseract.createWorker('chi_sim+eng', 1, {
            logger: m => {
                if (m.status === 'recognizing text') {
                    const pct = Math.round(m.progress * 100);
                    progressBar.style.width = pct + '%';
                    progressText.textContent = '正在识别文字... ' + pct + '%';
                } else if (m.status === 'loading tesseract core') {
                    progressText.textContent = '正在加载识别核心...';
                } else if (m.status === 'initializing tesseract') {
                    progressText.textContent = '正在初始化引擎...';
                } else if (m.status === 'loading language traineddata') {
                    progressText.textContent = '正在下载中文语言包（首次约需30秒）...';
                }
            }
        });

        const { data } = await worker.recognize(selectedFile);
        await worker.terminate();

        const text = data.text.trim();
        if (!text) {
            progressWrap.classList.remove('show');
            showToast('未识别到文字，请确认截图清晰且包含中文');
            btnStart.disabled = false;
            return;
        }

        resultText.value = text;
        resultMeta.textContent = '识别时间: ' + new Date().toLocaleTimeString()
            + ' | 置信度: ' + Math.round(data.confidence) + '%'
            + ' | 字数: ' + text.length;

        progressWrap.classList.remove('show');
        resultWrap.classList.add('show');

        // 自动下载 txt
        const name = selectedFile.name.replace(/\.[^.]+$/, '');
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name + '_识别结果.txt';
        a.click();
        URL.revokeObjectURL(url);

        showToast('识别完成，txt 已自动保存到下载文件夹');
    } catch (e) {
        progressWrap.classList.remove('show');
        console.error(e);
        showToast('识别失败：' + (e.message || '未知错误，请重试'));
    }
    btnStart.disabled = false;
}
</script>
</body>
</html>
