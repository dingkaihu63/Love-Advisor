<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱心理底层画像采集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .card { max-width: 640px; width: 100%; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); margin-top: 40px; margin-bottom: 40px; }
        h2 { font-size: 24px; margin-bottom: 8px; color: #1d1d1f; }
        .sub { color: #86868b; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .progress-wrap { width: 100%; margin-bottom: 8px; }
        .progress { width: 100%; height: 6px; background: #e8e8ed; border-radius: 3px; overflow: hidden; }
        .bar { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.4s ease; border-radius: 3px; }
        .progress-text { text-align: right; font-size: 12px; color: #86868b; margin-top: 4px; }
        .section-label { display: inline-block; background: #f0f0f5; color: #6e6e73; font-size: 12px; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; font-weight: 500; }
        .q-text { font-size: 17px; line-height: 1.7; margin-bottom: 24px; font-weight: 500; color: #1d1d1f; }
        .opts { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 14px 18px; border: 1.5px solid #d2d2d7; border-radius: 12px; background: #fafafa; cursor: pointer; font-size: 15px; text-align: left; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        .btn:hover { border-color: #667eea; background: #f5f3ff; transform: translateX(4px); }
        .btn.active { border-color: #667eea; background: linear-gradient(135deg, #f0edff, #f5f3ff); font-weight: 600; color: #5b4fc7; box-shadow: 0 2px 8px rgba(102,126,234,0.15); }
        .btn .num { width: 28px; height: 28px; border-radius: 50%; background: #e8e8ed; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #86868b; flex-shrink: 0; transition: all 0.2s; }
        .btn.active .num { background: #667eea; color: white; }
        .nav { display: flex; justify-content: space-between; margin-top: 32px; gap: 12px; }
        .nav button { padding: 12px 28px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .next { background: linear-gradient(135deg, #667eea, #764ba2); color: white; flex: 1; }
        .next:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .prev { background: transparent; color: #667eea; border: 1.5px solid #d2d2d7 !important; }
        .prev:hover { background: #f5f3ff; }
        .err { color: #ff3b30; font-size: 13px; margin-top: 10px; display: none; animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        #result { display: none; }
        .result-icon { font-size: 64px; margin-bottom: 16px; }
        .result-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #1d1d1f; }
        .result-sub { color: #86868b; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
        .scores-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .score-item { background: #f5f5f7; border-radius: 12px; padding: 14px; }
        .score-label { font-size: 12px; color: #86868b; margin-bottom: 4px; }
        .score-bar-wrap { height: 6px; background: #e0e0e0; border-radius: 3px; margin-bottom: 4px; overflow: hidden; }
        .score-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
        .score-value { font-size: 18px; font-weight: 700; }
        .score-desc { font-size: 11px; color: #86868b; }
        .type-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; margin: 4px; }
        .type-safe { background: #e8f8f0; color: #1a7f37; }
        .type-anxious { background: #fff8e1; color: #b8860b; }
        .type-avoidant { background: #e3f2fd; color: #1565c0; }
        .type-fearful { background: #fce4ec; color: #c62828; }
        .dark-warning { background: #fff3e0; border: 1px solid #ff9800; border-radius: 12px; padding: 14px; margin-top: 12px; font-size: 13px; color: #e65100; }
        textarea { width: 100%; height: 140px; font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace; font-size: 11px; background: #1d1d1f; color: #00ff41; padding: 16px; border-radius: 12px; border: none; resize: none; margin: 16px 0; line-height: 1.5; }
        .btn-group { display: flex; gap: 12px; }
        .copy { flex: 1; background: linear-gradient(135deg, #34c759, #30b350); color: white; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .copy:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(52,199,89,0.4); }
        .download { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 14px 20px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .download:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .copied-msg { display: none; color: #34c759; font-size: 13px; margin-top: 8px; font-weight: 500; }
    </style>
</head>
<body>
<div class="card" id="app">
    <h2>🧠 恋爱心理底层画像</h2>
    <div class="sub">基于大五人格(OCEAN) + 成人依恋理论 + 黑暗三角 + 关系决策维度<br>请根据第一直觉作答，50题约需5分钟</div>
    <div class="progress-wrap">
        <div class="progress"><div class="bar" id="bar"></div></div>
        <div class="progress-text" id="ptext">1/50</div>
    </div>
    <div class="section-label" id="section"></div>
    <div class="q-text" id="qt"></div>
    <div class="opts" id="opts"></div>
    <div class="err" id="err">⚠️ 请先选择一个选项再继续</div>
    <div class="nav">
        <button class="prev" id="prev" onclick="move(-1)">← 上一题</button>
        <button class="next" id="next" onclick="move(1)">下一题 →</button>
    </div>
</div>
<div class="card" id="result">
    <div class="result-icon">✅</div>
    <div class="result-title">画像采集完成</div>
    <div class="result-sub">以下是你的人格分析概览，完整数据已生成。<br>请点击「复制数据」粘贴给AI助手，即可获得深度解读。</div>
    <div class="scores-grid" id="scoresGrid"></div>
    <div id="typeArea"></div>
    <div id="darkArea"></div>
    <textarea id="out" readonly></textarea>
    <div class="btn-group">
        <button class="copy" onclick="copyData()">📋 复制数据发给AI</button>
        <button class="download" onclick="downloadJSON()">💾 保存JSON</button>
    </div>
    <div class="copied-msg" id="copiedMsg">✅ 已复制到剪贴板！现在粘贴给AI助手即可</div>
</div>
<script>
const sections = [
    { name: "日常习惯与行为模式", range: [0,13] },
    { name: "娱乐与审美偏好", range: [14,23] },
    { name: "社交与沟通风格", range: [24,31] },
    { name: "恋爱与亲密关系态度", range: [32,41] },
    { name: "自我认知与价值观", range: [42,49] }
];
const qs=[
"我习惯提前规划每天要做的事，不喜欢临时抱佛脚。",
"我的朋友会说我是一个守时的人，约会很少迟到。",
"我的房间或工作桌面大多数时候是整洁有序的。",
"一旦开始一项健身或学习计划，我能坚持三个月以上。",
"我很少因为小事而长时间焦虑或睡不着觉。",
"遇到压力时，我容易烦躁、情绪波动明显。",
"我经常反复思考别人对我说过的某句话，担心自己是不是做错了什么。",
"相比于身边的朋友，我更容易感到紧张或不安。",
"周末我更倾向于约朋友聚会或参加活动，而不只是一个人待着。",
"在聚会或社交场合中，我会主动和不太熟悉的人聊天。",
"和朋友在一起能给我补充能量，而不是消耗能量。",
"我相信通过自己的努力可以改变很多事情的结果。",
"当事情进展不顺时，我更多会反思自己的不足，而不是归咎于运气。",
"相比于回忆过去，我更关注未来的目标和计划。",
"我对不同类型的音乐都有兴趣，歌单里风格跨度很大。",
"看电影时，我更喜欢独立电影、纪录片或科幻题材，而非只有主流商业大片。",
"我喜欢尝试异国料理，对没吃过的菜系充满好奇。",
"我对哲学、心理学或抽象艺术类的话题有兴趣。",
"旅行时，我喜欢去小众的地方探索，而不是只去热门景点。",
"我喜欢看恐怖片或玩极限运动，享受那种肾上腺素飙升的感觉。",
"吃东西时，我偏爱辣味或刺激性强的口味。",
"我偏好欢快、节奏感强的音乐，而不是舒缓沉静的音乐。",
"如果玩游戏，我更偏爱角色扮演(RPG)或开放世界游戏，而不是纯粹的竞技游戏。",
"我看电影时容易被感人的情节打动，甚至会哭。",
"朋友心情不好时，我会主动倾听和陪伴，即使帮不上实质性的忙。",
"小组讨论时，我更倾向于协调大家的意见，而不是坚持自己的观点。",
"我常常担心自己在乎的人其实并没有那么在乎我。",
"如果朋友或伴侣很久没有回复我的消息，我会忍不住反复查看手机。",
"当关系变得太亲密时，我会感到有些不自在，想保持一点距离。",
"我很少主动和朋友分享内心最深处的烦恼。",
"在群体聊天中，我通常是说话比较多的那一方。",
"即使不同意对方的观点，我也很少直接打断或反驳。",
"在恋爱中，我经常会反复确认对方是否还爱我。",
"如果感觉对方有些冷淡，我会变得特别焦虑，想要立刻把事情说清楚。",
"我有时候会觉得恋爱和亲密关系太麻烦了，一个人过更自在。",
"对方对我太好或太黏人时，我会下意识想躲避。",
"我喜欢成为人群中的焦点，渴望被关注和欣赏。",
"有时候为了达到自己的目标，需要适当隐藏真实想法。",
"在竞争或博弈中，我认为大多数人都是自私的，所以我需要首先保护自己。",
"在以往的感情经历中，我感到满意的时间多于不满的时间。",
"一段关系中投入越多，我越难下定决心离开。",
"和伴侣或好友吵架后，我通常会主动尝试修复关系（道歉、开玩笑或表达和好意愿）。",
"总体上，我对自己感到满意。",
"我常常觉得自己不够好，比不上身边的人。",
"我乐于了解和尝试与自己原有习惯完全不同的生活方式。",
"我经常反思自己过去的决定，并思考是否可以做得更好。",
"我经常怀念过去的美好时光，觉得现在很多事情不如从前。",
"我觉得很多事情的结果由外部力量（运气、环境、他人）决定，自己很难改变。",
"当别人给我负面反馈时，我的第一反应是听取并思考哪里可以改进，而不是感到被攻击。",
"我认为冲突是关系的一部分，只要处理得当，反而能加深彼此的理解。"
];
const lb=["1 - 完全不符合","2 - 不太符合","3 - 一般","4 - 比较符合","5 - 完全符合"];
let i=0, a=Array(50).fill(0);
function getSection(idx) {
    for (const s of sections) { if (idx >= s.range[0] && idx <= s.range[1]) return s.name; }
    return "";
}
function init(){
    document.getElementById('bar').style.width=`${(i+1)*2}%`;
    document.getElementById('ptext').innerText=`${i+1}/50`;
    document.getElementById('section').innerText=getSection(i);
    document.getElementById('qt').innerText=`${i+1}. ${qs[i]}`;
    let h='';
    lb.forEach((l,idx)=>{
        h+=`<div class="btn ${a[i]===idx+1?'active':''}" onclick="sel(${idx+1})"><span class="num">${idx+1}</span><span>${l}</span></div>`;
    });
    document.getElementById('opts').innerHTML=h;
    document.getElementById('err').style.display='none';
    document.getElementById('prev').style.visibility=i>0?'visible':'hidden';
    document.getElementById('next').innerText=i===49?'提交 ✓':'下一题 →';
}
function sel(v){ a[i]=v; init(); }
function move(d){
    if(d===1 && a[i]===0){document.getElementById('err').style.display='block';return;}
    if(i===49 && d===1){calc();return;}
    i=Math.max(0,Math.min(49,i+d)); init();
}
function calc(){
    const g=(idx)=>a[idx]||0;
    const r=(idx)=>a[idx]?(6-a[idx]):0;
    const O=g(14)+g(15)+g(16)+g(17)+g(18)+g(22)+g(44)+g(45);
    const C=g(0)+g(1)+g(2)+g(3);
    const E=g(8)+g(9)+g(10)+g(21)+g(30);
    const A=g(23)+g(24)+g(25)+g(31);
    const N=r(4)+g(5)+g(6)+g(7);
    const AT=g(26)+g(27)+g(32)+g(33);
    const AV=g(28)+g(29)+g(34)+g(35);
    let attachType="unknown";
    if(AT<16&&AV<16) attachType="secure";
    else if(AT>=16&&AV<16) attachType="anxious";
    else if(AT<16&&AV>=16) attachType="avoidant";
    else attachType="fearful";
    const Narcissism=g(36);
    const Machiavellianism=g(37)+g(38);
    const SE=g(42)+r(43)+g(48);
    const L=g(11)+g(12)+r(47);
    const T_future=g(13), T_past=g(46);
    const SS=g(19)+g(20);
    const RU=g(39)+g(40);
    const G_repair=g(41)+g(49);
    const O_pct=Math.round(O/40*100);
    const C_pct=Math.round(C/20*100);
    const E_pct=Math.round(E/25*100);
    const A_pct=Math.round(A/20*100);
    const N_pct=Math.round(N/20*100);
    const attachNames={secure:"安全型",anxious:"焦虑型",avoidant:"回避型",fearful:"恐惧型"};
    const attachClasses={secure:"type-safe",anxious:"type-anxious",avoidant:"type-avoidant",fearful:"type-fearful"};
    const attachDescs={
        secure:"能健康依赖与独立，沟通坦诚，冲突后修复能力强——关系稳定的最强保护因素",
        anxious:"高情感表达，高需求感，容易陷入追的模式——需觉察被抛弃恐惧，学习适度留白",
        avoidant:"对亲密感不适，会贬低关系重要性——回避倾向几乎不随时间自然改变，判断关系时这是关键因素",
        fearful:"矛盾摇摆——建议在建立关系前先进行自我整合"
    };
    const dimColors={
        O:"linear-gradient(90deg,#667eea,#764ba2)",
        C:"linear-gradient(90deg,#34c759,#30b350)",
        E:"linear-gradient(90deg,#ff9500,#ff6b00)",
        A:"linear-gradient(90deg,#5ac8fa,#007aff)",
        N:"linear-gradient(90deg,#ff3b30,#ff2d55)"
    };
    const dimDescs={
        O:O>=30?"高开放性：好奇、审美敏感、喜欢新体验":O>=20?"中等开放性：有一定好奇心":"低开放性：偏好熟悉和稳定",
        C:C>=15?"高尽责性：自律、守承诺、关系稳定预测因子":C>=10?"中等尽责性：有一定条理性":"低尽责性：随性灵活",
        E:E>=18?"高外向性：善交际、积极情绪":E>=12?"中等外向性：适度社交":"低外向性：内向、深度社交",
        A:A>=15?"高宜人性：信任、利他、合作、冲突少":A>=10?"中等宜人性：平衡合作与自我":"低宜人性：直接、竞争性强",
        N:N>=15?"高神经质：易焦虑、情绪波动大（关系风险因素）":N>=10?"中等神经质：有一定情绪敏感性":"低神经质：情绪稳定、抗压"
    };
    let scoresHTML='';
    [{k:"O",l:"开放性 Openness",s:O,p:O_pct},{k:"C",l:"尽责性 Conscientiousness",s:C,p:C_pct},{k:"E",l:"外向性 Extraversion",s:E,p:E_pct},{k:"A",l:"宜人性 Agreeableness",s:A,p:A_pct},{k:"N",l:"神经质 Neuroticism",s:N,p:N_pct}].forEach(d=>{
        scoresHTML+=`<div class="score-item"><div class="score-label">${d.l}</div><div class="score-bar-wrap"><div class="score-bar-fill" style="width:${d.p}%;background:${dimColors[d.k]}"></div></div><div class="score-value">${d.s} <span style="font-size:12px;color:#86868b;font-weight:400">/ ${d.k==='O'?40:d.k==='E'?25:20}</span></div><div class="score-desc">${dimDescs[d.k]}</div></div>`;
    });
    document.getElementById('scoresGrid').innerHTML=scoresHTML;
    let typeHTML=`<div style="margin-top:16px;margin-bottom:16px"><div style="font-size:14px;color:#86868b;margin-bottom:8px">依恋类型</div><span class="type-badge ${attachClasses[attachType]}">${attachNames[attachType]}</span><div style="font-size:13px;color:#6e6e73;margin-top:8px;line-height:1.5">${attachDescs[attachType]}</div></div>`;
    typeHTML+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">`;
    typeHTML+=`<div class="score-item"><div class="score-label">自尊水平</div><div class="score-value">${SE} <span style="font-size:11px;color:#86868b;font-weight:400">/ 15</span></div><div class="score-desc">${SE>=10?"高自尊：自我价值感稳定":SE>=7?"中等自尊：有一定自我怀疑":"低自尊：需关注自我价值感"}</div></div>`;
    typeHTML+=`<div class="score-item"><div class="score-label">内控点</div><div class="score-value">${L} <span style="font-size:11px;color:#86868b;font-weight:400">/ 15</span></div><div class="score-desc">${L>=10?"内控型：相信努力改变命运":L>=7?"中等：有时归因外部":"外控型：倾向归因环境运气"}</div></div>`;
    typeHTML+=`<div class="score-item"><div class="score-label">感觉寻求</div><div class="score-value">${SS} <span style="font-size:11px;color:#86868b;font-weight:400">/ 10</span></div><div class="score-desc">${SS>=7?"高感觉寻求：追求刺激新奇":SS>=4?"中等：适度冒险":"低：偏好稳定安全"}</div></div>`;
    typeHTML+=`<div class="score-item"><div class="score-label">关系修复力</div><div class="score-value">${G_repair} <span style="font-size:11px;color:#86868b;font-weight:400">/ 10</span></div><div class="score-desc">${G_repair>=7?"强修复力：冲突后积极修复":G_repair>=4?"中等：有一定修复意识":"弱修复力：需学习冲突修复"}</div></div>`;
    typeHTML+=`</div>`;
    document.getElementById('typeArea').innerHTML=typeHTML;
    let darkHTML='';
    if(Narcissism>=4||Machiavellianism>=7){
        darkHTML=`<div class="dark-warning">⚠️ <strong>黑暗三角提示</strong>：自恋倾向 ${Narcissism}/5${Narcissism>=4?' ⚠️偏高':''} | 马基雅维利主义 ${Machiavellianism}/10${Machiavellianism>=7?' ⚠️偏高':''}<br>这不代表你有问题，但需注意在关系中是否出现操控、缺乏共情等行为模式。AI会在后续分析中结合此数据给出建议。</div>`;
    }
    document.getElementById('darkArea').innerHTML=darkHTML;
    const payload = JSON.stringify({
        version: "1.0",
        timestamp: new Date().toISOString(),
        dimensions: {
            big5: { O, C, E, A, N },
            attachment: { anxious: AT, avoidant: AV, type: attachType },
            darkTriad: { narcissism: Narcissism, machiavellianism: Machiavellianism },
            selfEsteem: SE,
            locusOfControl: L,
            timeOrientation: { future: T_future, past: T_past },
            sensationSeeking: SS,
            rusbult: { satisfaction: RU, repairAbility: G_repair }
        },
        rawAnswers: a,
        interpretation: {
            openness: dimDescs.O,
            conscientiousness: dimDescs.C,
            extraversion: dimDescs.E,
            agreeableness: dimDescs.A,
            neuroticism: dimDescs.N,
            attachmentType: attachNames[attachType],
            attachmentDesc: attachDescs[attachType]
        }
    }, null, 2);
    document.getElementById('out').value = `===QUIZ_DATA_START===\n${payload}\n===QUIZ_DATA_END===`;
    document.getElementById('app').style.display='none';
    document.getElementById('result').style.display='block';
}
function copyData(){
    const ta=document.getElementById('out');
    ta.select();
    navigator.clipboard.writeText(ta.value).then(()=>{
        document.getElementById('copiedMsg').style.display='block';
        setTimeout(()=>{document.getElementById('copiedMsg').style.display='none';},3000);
    }).catch(()=>{
        document.execCommand('copy');
    });
}
function downloadJSON(){
    const data=document.getElementById('out').value;
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const link=document.createElement('a');
    link.href=url;
    link.download=`love-profile-${new Date().toISOString().slice(0,10)}.json`;
    link.click();
    URL.revokeObjectURL(url);
}
init();
</script>
